<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaPro | Live Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0e14; 
            --card: #1e222d; 
            --border: #363c4e; 
            --text: #ffffff; 
            --blue: #2962ff; 
            --green: #00ff88; 
            --red: #ff3b30; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        header { 
            background: var(--card); 
            border-bottom: 1px solid var(--border); 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .logo { 
            font-weight: 800; 
            color: var(--blue); 
            letter-spacing: 1px; 
            font-size: 1.2rem;
        }

        .status-pill {
            background: rgba(0, 255, 136, 0.1);
            color: var(--green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--green);
        }

        .main-container { 
            display: flex; 
            flex: 1; 
            padding: 10px; 
            gap: 10px; 
            overflow: hidden; 
        }

        .sidebar { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            min-width: 320px; 
        }

        .chart-wrapper { 
            flex: 3; 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            overflow: hidden;
        }

        .panel { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-size: 11px;
            text-transform: uppercase;
            color: #787b86;
            margin-bottom: 8px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ALPHAPRO LIVE</div>
        <div class="status-pill">● MARKET CONNECTED</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="panel" style="height: 300px;">
                <div class="panel-header">Technical Analysis</div>
                <div id="gauge_widget" style="height:100%;"></div>
            </div>
            <div class="panel" style="flex:1;">
                <div class="panel-header">Economic Calendar</div>
                <div id="cal_widget" style="height:100%;"></div>
            </div>
        </div>

        <div class="chart-wrapper" id="main_chart"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 1. Load Main Chart
        new TradingView.widget({
            "autosize": true,
            "symbol": "FX:EURUSD",
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "main_chart"
        });

        // 2. Load Sidebar Widgets
        function renderWidget(id, scriptName, config) {
            const container = document.getElementById(id);
            const script = document.createElement('script');
            script.src = `https://s3.tradingview.com/external-embedding/${scriptName}`;
            script.async = true;
            script.innerHTML = JSON.stringify({
                ...config,
                "colorTheme": "dark",
                "isTransparent": true,
                "width": "100%",
                "height": "100%"
            });
            container.appendChild(script);
        }

        // Technical Analysis Gauge
        renderWidget("gauge_widget", "embed-widget-technical-analysis.js", {
            "interval": "1m",
            "symbol": "FX:EURUSD",
            "showIntervalTabs": true
        });

        // Economic Calendar
        renderWidget("cal_widget", "embed-widget-events.js", {
            "importanceFilter": "-1,0,1"
        });
    </script>
</body>
</html>
